# Display Model
# Represents a browser session/connection to the display server

name: display
description: Browser display session
pathname: id

fields:
  width:
    type: integer
    required: true
    minimum: 1
    description: Screen width in pixels

  height:
    type: integer
    required: true
    minimum: 1
    description: Screen height in pixels

  dpi:
    type: integer
    default: 1
    minimum: 1
    description: Device pixel ratio

  connected:
    type: boolean
    default: false
    index: true
    description: Browser currently connected

  session_id:
    type: text
    unique: true
    description: Browser session identifier

  user_agent:
    type: text
    description: Browser user agent string

  last_ping:
    type: timestamp
    description: Last heartbeat from browser
