# Event Model
# Represents an input event from the browser

name: event
description: Input event from browser
passthrough: true  # Skip observer rings for performance

fields:
  display_id:
    type: uuid
    required: true
    index: true
    description: Source display

  window_id:
    type: uuid
    index: true
    description: Target window

  element_id:
    type: uuid
    index: true
    description: Target element (if any)

  type:
    type: text
    required: true
    index: true
    enum:
      # Mouse events
      - click
      - dblclick
      - mousedown
      - mouseup
      - mousemove
      - mouseenter
      - mouseleave
      - contextmenu
      - wheel
      # Keyboard events
      - keydown
      - keyup
      - keypress
      # Focus events
      - focus
      - blur
      - focusin
      - focusout
      # Form events
      - input
      - change
      - submit
      # Touch events
      - touchstart
      - touchend
      - touchmove
      - touchcancel
      # Drag events
      - dragstart
      - drag
      - dragend
      - dragenter
      - dragleave
      - dragover
      - drop
      # Window events
      - resize
      - scroll
      # Clipboard
      - copy
      - cut
      - paste
      # Custom
      - custom
    description: Event type

  data:
    type: jsonb
    description: Event-specific data (coordinates, key, modifiers, etc.)

  timestamp:
    type: integer
    required: true
    index: true
    description: Event timestamp (Unix ms)

  # Common event properties extracted for querying
  target_tag:
    type: text
    description: Target element tag name

  key:
    type: text
    index: true
    description: Key pressed (for keyboard events)

  button:
    type: integer
    description: Mouse button (0=left, 1=middle, 2=right)

  x:
    type: integer
    description: X coordinate (relative to window)

  y:
    type: integer
    description: Y coordinate (relative to window)

  # Modifier keys
  shift:
    type: boolean
    default: false
    description: Shift key held

  ctrl:
    type: boolean
    default: false
    description: Control key held

  alt:
    type: boolean
    default: false
    description: Alt key held

  meta:
    type: boolean
    default: false
    description: Meta/Command key held

  # Event handling
  handled:
    type: boolean
    default: false
    index: true
    description: Event has been processed

  prevented:
    type: boolean
    default: false
    description: Default action prevented
