# Element Model
# Represents a DOM element within a window

name: element
description: UI element within a window
passthrough: true  # Skip observer rings 2-7 for performance

fields:
  window_id:
    type: uuid
    required: true
    index: true
    relationship:
      model: window
      type: owned
      name: elements
      cascade_delete: true
    description: Parent window

  parent_id:
    type: uuid
    index: true
    description: Parent element (null = window root)

  tag:
    type: text
    required: true
    default: div
    description: HTML tag name (div, button, input, span, etc.)

  props:
    type: jsonb
    description: Element properties (class, style, attributes, event handlers)

  text:
    type: text
    description: Text content

  order:
    type: integer
    default: 0
    description: Sibling order (for rendering sequence)

  # Layout hints (optional, browser does actual layout)
  flex:
    type: text
    description: Flex shorthand (e.g., "1", "0 0 auto")

  width:
    type: text
    description: CSS width value

  height:
    type: text
    description: CSS height value

  # State flags
  disabled:
    type: boolean
    default: false
    description: Element is disabled

  hidden:
    type: boolean
    default: false
    index: true
    description: Element is hidden

  # For input elements
  value:
    type: text
    description: Current input value

  placeholder:
    type: text
    description: Placeholder text for inputs

  # For focusable elements
  tabindex:
    type: integer
    description: Tab order (-1 = not focusable)

  autofocus:
    type: boolean
    default: false
    description: Auto-focus on mount
